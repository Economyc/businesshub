server {
    server_name businesshub.myvnc.com;
    root /var/www/html;
    index index.html;

    # Proxy al Cloud Function posProxy. El cliente llama a
    # https://businesshub.myvnc.com/api/pos (mismo dominio), nginx reenvía
    # a la Cloud Function. Evade adblockers que bloquean *.a.run.app.
    location = /api/pos {
        proxy_pass https://posproxy-xfyucmyk7q-uc.a.run.app/;
        proxy_set_header Host posproxy-xfyucmyk7q-uc.a.run.app;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_read_timeout 310s;
        proxy_send_timeout 310s;
        proxy_connect_timeout 60s;
        proxy_request_buffering off;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # index.html NUNCA se cachea — debe pedirlo siempre para ver hashes nuevos
    # del build más reciente. Sin esto, clientes con cache viejo cargan JS
    # que referencian chunks que ya no existen tras un deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets con hash en el nombre (Vite los emite así): cache 1 año inmutable.
    # El navegador ni pregunta al servidor en recargas posteriores.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/wasm
        image/svg+xml;

    # brotli: descomentar si `nginx -V 2>&1 | grep brotli` confirma el módulo.
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript application/wasm text/xml image/svg+xml;

    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/businesshub.myvnc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/businesshub.myvnc.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = businesshub.myvnc.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name businesshub.myvnc.com;
    return 404;
}
